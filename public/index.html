<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>Roulette Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --gold:#d4a853;--gdim:#886b30;--bg:#0b0b14;--sf:#13131f;
    --red:#dc2626;--blk:#1e1e32;--grn:#16a34a;--sab:env(safe-area-inset-bottom,0px);
    --hot:#ff6b35;--cold:#60a5fa;
  }
  html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg)}
  body{font-family:'Noto Sans JP',sans-serif;color:#e0d8c8;display:flex;flex-direction:column;max-width:480px;margin:0 auto;height:100dvh;overflow:hidden}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:linear-gradient(180deg,rgba(212,168,83,0.08),transparent);border-bottom:1px solid rgba(212,168,83,0.12);flex-shrink:0}
  .hdr-left{display:flex;align-items:center;gap:8px}
  .hdr-title{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px}
  .hdr-stats{display:flex;gap:10px;align-items:center}
  .hdr-stat{display:flex;flex-direction:column;align-items:center}
  .hdr-stat-val{font-size:18px;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace;line-height:1}
  .hdr-stat-lbl{font-size:9px;color:var(--gdim);letter-spacing:0.5px}
  .hdr-sep{width:1px;height:28px;background:rgba(212,168,83,0.15)}
  .hdr-timer{font-size:13px;font-family:'DM Mono',monospace}
  .hdr-right{display:flex;align-items:center;gap:4px}
  .hdr-btn{background:none;border:1px solid rgba(212,168,83,0.2);color:var(--gdim);border-radius:5px;padding:5px 8px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
  .hdr-btn:disabled{opacity:.2}
  .hdr-btn.danger{border-color:rgba(220,38,38,0.3);color:#dc2626}
  .hdr-btn.act{border-color:rgba(212,168,83,0.4);color:var(--gold)}

  /* TABS */
  .tabs{display:flex;flex-shrink:0;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.05)}
  .tab{flex:1;padding:7px 4px;text-align:center;font-size:11px;color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  /* HISTORY */
  .hist{display:flex;gap:3px;padding:5px 12px;overflow-x:auto;flex-shrink:0;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.03);scrollbar-width:none;min-height:32px;align-items:center}
  .hist::-webkit-scrollbar{display:none}
  .hist .emp{font-size:12px;color:#555}
  .mc{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;border:1.5px solid rgba(212,168,83,0.35)}
  .mc.r{background:var(--red)}.mc.b{background:#2a2a44}.mc.g{background:var(--grn)}
  .mc.new-entry{animation:pop .3s ease-out}
  @keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

  /* MID AREA */
  .mid{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:6px;min-height:0;scrollbar-width:none}
  .mid::-webkit-scrollbar{display:none}

  /* PAGE */
  .page{display:none;flex-direction:column;gap:6px}
  .page.active{display:flex}

  /* Category card */
  .cat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 10px}
  .cat-label{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  .cat-sub{font-size:10px;color:var(--gdim);font-weight:400}

  /* 2-way split */
  .split2{display:flex;gap:5px}
  .split2 .s2-item{flex:1;border-radius:6px;padding:6px 10px}
  .s2-top{display:flex;align-items:baseline;justify-content:space-between}
  .s2-label{font-size:14px;font-weight:700}
  .s2-count{font-size:26px;font-weight:800;font-family:'DM Mono',monospace}
  .s2-pct{font-size:16px;font-family:'DM Mono',monospace;font-weight:700}
  .s2-dev{font-size:10px;margin-top:1px;font-family:'DM Mono',monospace}
  .s2-bar{height:5px;border-radius:3px;margin-top:5px;overflow:hidden;display:flex}
  .bar-seg{transition:width .4s ease}

  /* 4-way split */
  .split4{display:flex;gap:3px}
  .split4 .s4-item{flex:1;border-radius:6px;padding:5px 7px}
  .s4-label{font-size:13px;font-weight:700}
  .s4-count{font-size:24px;font-weight:800;font-family:'DM Mono',monospace}
  .s4-pct{font-size:14px;font-family:'DM Mono',monospace;font-weight:700}
  .s4-zero{max-width:24%}

  /* 3-way split */
  .split3{display:flex;gap:4px}
  .split3 .s3-item{flex:1;border-radius:6px;padding:6px 8px;text-align:center}
  .s3-label{font-size:13px;font-weight:700}
  .s3-count{font-size:24px;font-weight:800;font-family:'DM Mono',monospace}
  .s3-pct{font-size:13px;font-family:'DM Mono',monospace;font-weight:600;opacity:.8}
  .s3-dev{font-size:9px;font-family:'DM Mono',monospace;margin-top:2px}
  .s3-nums{font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;line-height:1.3}

  /* Recommend */
  .rec{background:rgba(212,168,83,0.07);border:1px solid rgba(212,168,83,0.18);border-radius:8px;padding:8px 10px}
  .rec-title{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:5px}
  .rec-tags{display:flex;gap:4px;flex-wrap:wrap}
  .rec-tag{background:rgba(212,168,83,0.14);border-radius:5px;padding:3px 9px;font-weight:700;font-size:13px;color:var(--gold);white-space:nowrap}
  .rec-hint{font-size:10px;color:var(--gdim);margin-top:4px}

  /* STREAK CARD */
  .streak-row{display:flex;gap:4px}
  .streak-item{flex:1;border-radius:6px;padding:6px 5px;text-align:center}
  .streak-label{font-size:10px;color:rgba(255,255,255,0.45);margin-bottom:2px}
  .streak-val{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}
  .streak-sub{font-size:9px;margin-top:1px}

  /* HOT/COLD */
  .hc-row{display:flex;gap:5px}
  .hc-col{flex:1;border-radius:6px;padding:7px 8px}
  .hc-title{font-size:11px;font-weight:700;margin-bottom:6px}
  .hc-nums{display:flex;flex-direction:column;gap:4px}
  .hc-item{display:flex;align-items:center;gap:5px}
  .hc-ball{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:'DM Mono',monospace}
  .hc-bar-wrap{flex:1;background:rgba(255,255,255,0.07);border-radius:3px;height:5px;overflow:hidden}
  .hc-bar{height:100%;border-radius:3px;transition:width .4s ease}
  .hc-cnt{font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.6);width:20px;text-align:right}

  /* GRID */
  .num-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px}
  .ng-cell{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.08);position:relative;overflow:hidden;transition:opacity .2s}
  .ng-cell:active{opacity:.7}
  .ng-cell .ng-num{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.9);position:relative;z-index:1;line-height:1}
  .ng-cell .ng-cnt{font-size:7px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.55);position:relative;z-index:1;margin-top:1px}
  .ng-cell .ng-fill{position:absolute;bottom:0;left:0;right:0;transition:height .4s ease;opacity:0.4}
  .ng-cell.r-cell{background:rgba(220,38,38,0.12);border-color:rgba(220,38,38,0.2)}
  .ng-cell.r-cell .ng-fill{background:#dc2626}
  .ng-cell.b-cell{background:rgba(30,30,50,0.5);border-color:rgba(255,255,255,0.08)}
  .ng-cell.b-cell .ng-fill{background:#6060a0}
  .ng-cell.g-cell{background:rgba(22,163,74,0.15);border-color:rgba(22,163,74,0.3)}
  .ng-cell.g-cell .ng-fill{background:#16a34a}

  /* DEVIATION */
  .dev-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
  .dev-row:last-child{border-bottom:none}
  .dev-label{font-size:11px;color:rgba(255,255,255,0.65);width:68px;flex-shrink:0}
  .dev-bar-wrap{flex:1;background:rgba(255,255,255,0.06);border-radius:3px;height:7px;overflow:hidden;position:relative}
  .dev-expected{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.25)}
  .dev-actual{height:100%;border-radius:3px;transition:width .4s ease}
  .dev-pct{font-size:10px;font-family:'DM Mono',monospace;width:36px;text-align:right;flex-shrink:0;color:#888}
  .dev-diff{font-size:10px;font-family:'DM Mono',monospace;width:34px;flex-shrink:0;text-align:right}

  /* QUICK INPUT */
  .quick-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;padding:6px 10px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.05)}
  .quick-btn{padding:5px 0;border-radius:5px;border:1px solid rgba(255,255,255,0.1);font-size:11px;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;text-align:center;transition:transform .1s,opacity .2s;color:#fff}
  .quick-btn:active{transform:scale(.88)}
  .quick-btn.qr{background:rgba(220,38,38,0.3);border-color:rgba(220,38,38,0.4)}
  .quick-btn.qb{background:rgba(40,40,70,0.6);border-color:rgba(100,100,150,0.25)}
  .quick-btn.qg{background:rgba(22,163,74,0.25);border-color:rgba(22,163,74,0.4)}
  .quick-toggle-bar{padding:3px 10px;background:rgba(0,0,0,0.25);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0}
  .quick-toggle{width:100%;padding:5px 12px;background:none;border:none;color:#444;font-size:11px;cursor:pointer;text-align:left;font-family:'Noto Sans JP',sans-serif}
  .quick-toggle.open{color:var(--gdim)}

  /* INPUT BAR */
  .input-bar{flex-shrink:0;padding:7px 10px calc(7px + var(--sab));background:var(--sf);border-top:1px solid rgba(212,168,83,0.1);display:flex;align-items:center;gap:6px}
  .input-bar input{flex:1;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(212,168,83,0.25);color:#e0d8c8;font-size:18px;font-family:'DM Mono',monospace;outline:none;text-align:center;caret-color:var(--gold)}
  .input-bar input::placeholder{color:#444;font-size:13px}
  .input-bar input:focus{border-color:var(--gold);background:rgba(255,255,255,0.1)}
  .submit-btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#d4a853,#b8912e);color:#0b0b14;font-weight:700;font-size:15px;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
  .submit-btn:active{transform:scale(.95)}

  /* EXPORT/IMPORT MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.hidden{display:none}
  .modal{background:#181828;border:1px solid rgba(212,168,83,0.3);border-radius:12px;padding:16px;width:100%;max-width:420px}
  .modal-title{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:10px}
  .modal textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#e0d8c8;font-family:'DM Mono',monospace;font-size:12px;padding:8px;resize:none;outline:none;height:90px}
  .modal-btns{display:flex;gap:6px;margin-top:10px}
  .modal-btn{flex:1;padding:8px;border-radius:6px;border:1px solid rgba(212,168,83,0.25);background:rgba(212,168,83,0.08);color:var(--gold);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
  .modal-btn.primary{background:linear-gradient(135deg,#d4a853,#b8912e);color:#0b0b14;border:none;font-weight:700}
  .modal-btn.close-btn{background:none;color:#555;border-color:rgba(255,255,255,0.08)}

  /* TOAST */
  .toast{position:fixed;bottom:calc(72px + var(--sab));left:50%;transform:translateX(-50%) translateY(16px);background:rgba(212,168,83,0.95);color:#0b0b14;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* EMPTY */
  .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px;text-align:center;padding:20px;line-height:2.2;min-height:120px}

  /* FILTER BAR */
  .filter-bar{display:flex;gap:4px;padding:4px 10px;flex-shrink:0;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.04);align-items:center}
  .filter-label{font-size:10px;color:#555;margin-right:2px;white-space:nowrap}
  .filter-btn{padding:3px 9px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:none;color:#666;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s}
  .filter-btn.active{background:rgba(212,168,83,0.18);border-color:rgba(212,168,83,0.4);color:var(--gold)}
  .eu-toggle{margin-left:auto;padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:none;color:#666;font-size:10px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
  .eu-toggle.on{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.4);color:#60a5fa}

  /* DUE NUMBERS */
  .ng-due{font-size:6px;font-family:'DM Mono',monospace;position:relative;z-index:1;line-height:1;margin-top:1px}
  .ng-cell.never-seen{outline:2px dashed rgba(212,168,83,0.5);outline-offset:-2px}

  /* HISTORY TABLE */
  .hist-table{width:100%;border-collapse:collapse;font-size:11px;font-family:'DM Mono',monospace}
  .hist-table th{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--gdim);text-align:center;font-weight:600;font-size:10px}
  .hist-table td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:center;color:#aaa}
  .hist-table tr:last-child td{border-bottom:none}
  .hist-table .ht-num{font-weight:700;font-size:14px}
  .hist-ball{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:'DM Mono',monospace}

  /* BET TRACKER */
  .bet-row{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
  .bet-btn{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#888;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s}
  .bet-btn.selected{border-color:rgba(212,168,83,0.5);background:rgba(212,168,83,0.12);color:var(--gold);font-weight:700}
  .bet-stat-row{display:flex;gap:6px}
  .bet-stat{flex:1;border-radius:6px;padding:6px;text-align:center;background:rgba(255,255,255,0.03)}
  .bet-stat-val{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}
  .bet-stat-lbl{font-size:10px;color:#555}

  /* INSTALL PROMPT */
  .install-banner{display:none;margin:4px 10px;padding:8px 12px;border-radius:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);align-items:center;gap:8px;flex-shrink:0}
  .install-banner.show{display:flex}
  .install-banner-text{flex:1;font-size:12px;color:#93c5fd;line-height:1.4}
  .install-btn-small{padding:5px 12px;border-radius:6px;background:rgba(59,130,246,0.25);border:1px solid rgba(59,130,246,0.4);color:#60a5fa;font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif}

  /* VIBRATION VISUAL FEEDBACK */
  @keyframes tap-flash{0%{opacity:1}50%{opacity:0.5;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
  .ng-cell:active{animation:tap-flash .15s ease-out}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  /* KEYBOARD SHORTCUT HELP */
  .help-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
  .help-overlay.show{display:flex}
  .help-box{background:#181828;border:1px solid rgba(212,168,83,0.3);border-radius:12px;padding:16px;width:100%;max-width:380px}
  .help-title{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:12px}
  .help-row{display:flex;gap:10px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
  .help-row:last-child{border-bottom:none}
  .help-key{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:12px;color:#ccc;white-space:nowrap}
  .help-desc{font-size:12px;color:#888}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">ROULETTE</div>
    <div class="hdr-stats">
      <div class="hdr-stat">
        <div class="hdr-stat-val" id="spinCount">0</div>
        <div class="hdr-stat-lbl">SPINS</div>
      </div>
      <div class="hdr-sep"></div>
      <div class="hdr-stat">
        <div class="hdr-stat-val hdr-timer" id="timerDisp">00:00</div>
        <div class="hdr-stat-lbl">TIME</div>
      </div>
    </div>
  </div>
  <div class="hdr-right">
    <div id="hdrStreak" style="display:none;margin-right:4px;font-size:10px;font-family:'DM Mono',monospace;text-align:center;line-height:1.2">
      <div id="hdrStreakVal" style="font-size:16px;font-weight:800;line-height:1"></div>
      <div id="hdrStreakLbl" style="color:#666;font-size:9px"></div>
    </div>
    <button class="hdr-btn act" id="btnExport">↑保存</button>
    <button class="hdr-btn" id="btnUndo" disabled>↩戻す</button>
    <button class="hdr-btn danger" id="btnReset" disabled>リセット</button>
    <button class="hdr-btn" id="btnHelp" title="ヘルプ">?</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-page="Stats">📊 統計</div>
  <div class="tab" data-page="Grid">🔢 グリッド</div>
  <div class="tab" data-page="Analysis">📈 分析</div>
  <div class="tab" data-page="Hist">📋 履歴</div>
  <div class="tab" data-page="Bet">💰 ベット</div>
</div>

<!-- HISTORY STRIP -->
<div class="hist" id="histStrip"><span class="emp">↓ 出目を入力</span></div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <span class="filter-label">直近:</span>
  <button class="filter-btn" data-n="10">10</button>
  <button class="filter-btn" data-n="20">20</button>
  <button class="filter-btn" data-n="50">50</button>
  <button class="filter-btn active" data-n="0">全</button>
  <button class="eu-toggle" id="euToggle">EU切替</button>
</div>

<!-- PWA INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">📱 ホーム画面に追加するとオフラインでも使えます</div>
  <button class="install-btn-small" id="btnInstall">インストール</button>
</div>

<!-- MAIN CONTENT -->
<div class="mid">
  <div class="page active" id="pageStats"></div>
  <div class="page" id="pageGrid"></div>
  <div class="page" id="pageAnalysis"></div>
  <div class="page" id="pageHist"></div>
  <div class="page" id="pageBet"></div>
</div>

<!-- QUICK INPUT -->
<div id="quickWrap" style="display:none">
  <div class="quick-grid" id="quickGrid"></div>
</div>
<div class="quick-toggle-bar">
  <button class="quick-toggle" id="btnQuick">⚡ クイック入力を表示</button>
</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <input type="text" id="numInput" inputmode="numeric" pattern="[0-9]*" placeholder="0, 00, 1〜36" autocomplete="off">
  <button class="submit-btn" id="btnSubmit">入力</button>
</div>

<!-- EXPORT/IMPORT MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">データ保存 / 読込</div>
    <textarea id="modalTextarea" placeholder="データをここに貼り付け..."></textarea>
    <div class="modal-btns">
      <button class="modal-btn primary" id="modalAction">コピー</button>
      <button class="modal-btn" id="btnSwitchMode">インポートに切替</button>
      <button class="modal-btn close-btn" id="modalClose">閉じる</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- KEYBOARD SHORTCUT HELP -->
<div class="help-overlay" id="helpOverlay">
  <div class="help-box">
    <div class="help-title">⌨️ キーボードショートカット</div>
    <div class="help-row"><span class="help-key">0〜9, Enter</span><span class="help-desc">数字入力・決定</span></div>
    <div class="help-row"><span class="help-key">Backspace</span><span class="help-desc">最後の1件を削除 (戻す)</span></div>
    <div class="help-row"><span class="help-key">?</span><span class="help-desc">このヘルプを表示/閉じる</span></div>
    <div class="help-row"><span class="help-key">Tab</span><span class="help-desc">次のタブへ切替</span></div>
    <div class="help-row"><span class="help-key">Q</span><span class="help-desc">クイック入力の表示/非表示</span></div>
    <div class="help-row"><span class="help-key">Esc</span><span class="help-desc">ヘルプ・モーダルを閉じる</span></div>
    <div style="margin-top:12px;text-align:center">
      <button class="modal-btn close-btn" onclick="document.getElementById('helpOverlay').classList.remove('show')" style="display:inline-block;padding:6px 20px">閉じる</button>
    </div>
  </div>
</div>

<script>
// ===== データ定義 =====
const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const COL1 = [1,4,7,10,13,16,19,22,25,28,31,34];
const COL2 = [2,5,8,11,14,17,20,23,26,29,32,35];
const COL3 = [3,6,9,12,15,18,21,24,27,30,33,36];
// アメリカンルーレット ホイール順序 (0起点で時計回り)
const WHEEL_ORDER = [0,-1,2,14,35,23,4,16,33,21,6,18,31,19,8,12,29,25,10,27,00,28,9,26,30,11,7,20,32,17,5,22,34,15,3,24,36,13,1];
// ホイール上の8分割セクター
const WHEEL_SECTORS = [
  { name: 'セクター1 (0近辺)', nums: [0,-1,2,14,35,23], color: '#16a34a' },
  { name: 'セクター2 (4〜16)', nums: [4,16,33,21,6], color: '#ef4444' },
  { name: 'セクター3 (18〜31)', nums: [18,31,19,8,12], color: '#3b82f6' },
  { name: 'セクター4 (29〜10)', nums: [29,25,10,27], color: '#8b5cf6' },
  { name: 'セクター5 (28〜26)', nums: [28,9,26,30,11], color: '#f59e0b' },
  { name: 'セクター6 (7〜32)', nums: [7,20,32,17,5], color: '#ec4899' },
  { name: 'セクター7 (22〜15)', nums: [22,34,15,3,24], color: '#14b8a6' },
  { name: 'セクター8 (36〜1)', nums: [36,13,1], color: '#f97316' },
];

const disp = n => n === -1 ? '00' : String(n);
const getClr = n => (n === 0 || n === -1) ? 'g' : REDS.includes(n) ? 'r' : 'b';
const getClrLabel = n => (n === 0 || n === -1) ? null : REDS.includes(n) ? '赤' : '黒';

let history = [];
let sessionStart = null;

// フィルター・モード設定
let filterN = 0;          // 0=全, 10/20/50=直近N件
let europeanMode = false;  // true=ヨーロピアン(00なし)

// ベット追跡
let betType = null;        // 'red','black','odd','even','low','high'
let betWins = 0, betLosses = 0, betPushes = 0;

// ローカルストレージから復元
try { const d = localStorage.getItem('rt5'); if (d) history = JSON.parse(d); } catch(e) {}
try { const t = localStorage.getItem('rt5_start'); if (t && history.length) sessionStart = parseInt(t); } catch(e) {}
try { const b = localStorage.getItem('rt5_bet'); if (b) { const bd = JSON.parse(b); betType = bd.t || null; betWins = bd.w || 0; betLosses = bd.l || 0; betPushes = bd.p || 0; } } catch(e) {}

// フィルター適用後の履歴を返す
function getFiltered() {
  let h = history;
  if (europeanMode) h = h.filter(n => n !== -1); // 00を除外
  if (filterN > 0) h = h.slice(-filterN);
  return h;
}

function save() {
  try { localStorage.setItem('rt5', JSON.stringify(history)); } catch(e) {}
  if (sessionStart) try { localStorage.setItem('rt5_start', String(sessionStart)); } catch(e) {}
}

// ===== タイマー =====
setInterval(() => {
  if (!sessionStart) { document.getElementById('timerDisp').textContent = '00:00'; return; }
  const sec = Math.floor((Date.now() - sessionStart) / 1000);
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  document.getElementById('timerDisp').textContent = `${m}:${s}`;
}, 1000);

// ===== トースト =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== 入力 =====
const $input = document.getElementById('numInput');
document.getElementById('btnSubmit').onclick = submitInput;
$input.addEventListener('keydown', e => { if (e.key === 'Enter') submitInput(); });

function submitInput() {
  const raw = $input.value.trim();
  if (raw === '') return;
  if (raw === '00') { addNum(-1); $input.value = ''; $input.focus(); return; }
  const n = parseInt(raw, 10);
  if (!isNaN(n) && n >= 0 && n <= 36) {
    addNum(n); $input.value = '';
    $input.style.borderColor = '';
  } else {
    // 入力エラーを視覚的に表示
    $input.style.borderColor = '#dc2626';
    $input.style.animation = 'none';
    requestAnimationFrame(() => {
      $input.style.animation = 'shake .3s ease';
    });
    showToast('⚠️ 0, 00, または 1〜36 を入力してください');
    setTimeout(() => { $input.style.borderColor = ''; }, 1000);
  }
  $input.focus();
}

function addNum(n) {
  if (!sessionStart) { sessionStart = Date.now(); save(); }
  // ベット追跡
  if (betType) {
    const res = getBetResult(n, betType);
    if (res === 'win') betWins++;
    else if (res === 'loss') betLosses++;
    else betPushes++;
    saveBet();
  }
  history.push(n);
  save();
  render();
}

// ===== 戻す / リセット =====
document.getElementById('btnUndo').onclick = () => {
  if (history.length) { history.pop(); save(); render(); }
};
document.getElementById('btnReset').onclick = () => {
  if (!confirm('全データをリセットしますか？\n（直前のセッションは復元できます）')) return;
  // 現在のセッションを保存
  if (history.length > 0) {
    try {
      const sessions = JSON.parse(localStorage.getItem('rt5_sessions') || '[]');
      sessions.unshift({ data: [...history], start: sessionStart, resetAt: Date.now() });
      localStorage.setItem('rt5_sessions', JSON.stringify(sessions.slice(0, 5))); // 最大5セッション保存
    } catch(e) {}
  }
  history = []; sessionStart = null;
  localStorage.removeItem('rt5'); localStorage.removeItem('rt5_start');
  render();
  showToast('リセット完了（「↑保存」→インポートで復元可能）');
};

// ===== クイック入力ボタン構築 =====
(function buildQuick() {
  const grid = document.getElementById('quickGrid');
  const defs = [
    { n: 0, l: '0', c: 'qg' }, { n: -1, l: '00', c: 'qg' },
    ...Array.from({ length: 36 }, (_, i) => ({
      n: i + 1, l: String(i + 1), c: REDS.includes(i + 1) ? 'qr' : 'qb'
    }))
  ];
  defs.forEach(({ n, l, c }) => {
    const b = document.createElement('button');
    b.className = `quick-btn ${c}`;
    b.textContent = l;
    b.onclick = () => { addNum(n); showToast(`${disp(n)} を入力`); };
    grid.appendChild(b);
  });
})();

document.getElementById('btnQuick').onclick = function() {
  const w = document.getElementById('quickWrap');
  const open = w.style.display !== 'none';
  w.style.display = open ? 'none' : 'block';
  this.textContent = open ? '⚡ クイック入力を表示' : '✕ クイック入力を閉じる';
  this.classList.toggle('open', !open);
};

// ===== フィルターバー =====
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    filterN = parseInt(this.dataset.n);
    render();
  };
});

document.getElementById('euToggle').onclick = function() {
  europeanMode = !europeanMode;
  this.classList.toggle('on', europeanMode);
  this.textContent = europeanMode ? '🇪🇺 EU中' : 'EU切替';
  showToast(europeanMode ? 'ヨーロピアンモード (00を除外)' : 'アメリカンモードに戻す');
  render();
};

// ===== タブ切替 =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    const id = 'page' + this.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };
});

// ===== エクスポート/インポート =====
let modalMode = 'export';
document.getElementById('btnExport').onclick = () => openModal('export');
document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.add('hidden');
document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) this.classList.add('hidden'); };

document.getElementById('btnSwitchMode').onclick = function() {
  if (modalMode === 'export') {
    modalMode = 'import';
    document.getElementById('modalTitle').textContent = 'データインポート';
    document.getElementById('modalTextarea').value = '';
    document.getElementById('modalTextarea').readOnly = false;
    document.getElementById('modalTextarea').placeholder = 'カンマ区切りで貼り付け (例: 7,0,00,14,32)';
    document.getElementById('modalAction').textContent = 'インポート';
    this.textContent = 'エクスポートに切替';
  } else {
    openModal('export');
    this.textContent = 'インポートに切替';
  }
};

document.getElementById('modalAction').onclick = function() {
  if (modalMode === 'export') {
    const txt = document.getElementById('modalTextarea').value;
    navigator.clipboard.writeText(txt)
      .then(() => showToast('コピーしました'))
      .catch(() => showToast('コピー失敗'));
  } else {
    const raw = document.getElementById('modalTextarea').value.trim();
    if (!raw) { showToast('データがありません'); return; }
    const parts = raw.split(/[\s,]+/).filter(Boolean);
    const imported = [];
    for (const p of parts) {
      if (p === '00') { imported.push(-1); }
      else { const n = parseInt(p, 10); if (!isNaN(n) && n >= 0 && n <= 36) imported.push(n); }
    }
    if (!imported.length) { showToast('有効なデータがありません'); return; }
    history = [...imported];
    if (!sessionStart) sessionStart = Date.now();
    save(); render();
    document.getElementById('modalOverlay').classList.add('hidden');
    showToast(`${imported.length}件インポートしました`);
  }
};

function openModal(mode) {
  modalMode = mode;
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('modalTitle').textContent = 'データ書き出し';
  const txt = history.map(n => n === -1 ? '00' : String(n)).join(',');
  // 過去セッション情報を付加
  let extraInfo = '';
  try {
    const sessions = JSON.parse(localStorage.getItem('rt5_sessions') || '[]');
    if (sessions.length > 0) {
      const latest = sessions[0];
      const d = new Date(latest.resetAt);
      const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      extraInfo = `\n\n# 直前のセッション (${timeStr} リセット, ${latest.data.length}件):\n` +
        latest.data.map(n => n === -1 ? '00' : String(n)).join(',');
    }
  } catch(e) {}
  document.getElementById('modalTextarea').value = (txt || '(データなし)') + extraInfo;
  document.getElementById('modalTextarea').readOnly = true;
  document.getElementById('modalAction').textContent = 'コピー';
  document.getElementById('btnSwitchMode').textContent = 'インポートに切替';
}

// ===== ヘッダーストリーク更新 =====
function updateHeaderStreak() {
  const { curStr, curType } = calcStreaks();
  const el = document.getElementById('hdrStreak');
  if (!curStr || !curType) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  const color = curType === '赤' ? '#ef4444' : curType === '黒' ? '#9ca3af' : curType === '奇' ? '#8b5cf6' : curType === '偶' ? '#0ea5e9' : '#f59e0b';
  document.getElementById('hdrStreakVal').style.color = color;
  document.getElementById('hdrStreakVal').textContent = curStr;
  document.getElementById('hdrStreakLbl').textContent = curType + '連続';
}

// ヘルプボタン
document.getElementById('btnHelp').onclick = () => {
  document.getElementById('helpOverlay').classList.toggle('show');
};

// ===== ヘルパー =====
function pct(count, total) { return total > 0 ? Math.round(count / total * 100) : 0; }
function dev(count, total, expected) {
  if (!total) return '';
  const diff = count / total * 100 - expected;
  const sign = diff >= 0 ? '+' : '';
  return `${sign}${diff.toFixed(1)}%`;
}
function devColor(count, total, expected) {
  if (!total) return '#555';
  const diff = count / total * 100 - expected;
  if (Math.abs(diff) < 2.5) return '#555';
  return diff > 0 ? '#f59e0b' : '#60a5fa';
}

// ===== ストリーク計算 =====
function calcStreaks() {
  let rStr = 0, bStr = 0, oStr = 0, eStr = 0, lStr = 0, hStr = 0;
  let maxR = 0, maxB = 0, maxO = 0, maxE = 0, maxL = 0, maxH = 0;

  for (const n of history) {
    const lbl = getClrLabel(n);
    if (lbl === '赤') { rStr++; bStr = 0; } else if (lbl === '黒') { bStr++; rStr = 0; } else { rStr = 0; bStr = 0; }
    maxR = Math.max(maxR, rStr); maxB = Math.max(maxB, bStr);
    const isOdd = n > 0 && n % 2 !== 0, isEven = n > 0 && n % 2 === 0;
    if (isOdd) { oStr++; eStr = 0; } else if (isEven) { eStr++; oStr = 0; } else { oStr = 0; eStr = 0; }
    maxO = Math.max(maxO, oStr); maxE = Math.max(maxE, eStr);
    const isLow = n > 0 && n <= 18, isHigh = n > 0 && n > 18;
    if (isLow) { lStr++; hStr = 0; } else if (isHigh) { hStr++; lStr = 0; } else { lStr = 0; hStr = 0; }
    maxL = Math.max(maxL, lStr); maxH = Math.max(maxH, hStr);
  }

  // 現在のストリーク
  let curStr = 0, curType = null;
  if (history.length > 0) {
    const last = history[history.length - 1];
    const lbl = getClrLabel(last);
    if (lbl) { curStr = lbl === '赤' ? rStr : bStr; curType = lbl; }
    else if (last > 0) {
      const isOdd = last % 2 !== 0;
      curStr = isOdd ? oStr : eStr; curType = isOdd ? '奇' : '偶';
    }
  }
  return { curStr, curType, maxR, maxB, maxO, maxE, maxL, maxH };
}

// ===== レコメンド =====
function getRecs() {
  if (history.length < 5) return [];
  const last20 = history.slice(-20), nz = last20.filter(n => n > 0), sugs = [];
  const reds = last20.filter(n => REDS.includes(n)).length;
  const blacks = last20.filter(n => n > 0 && !REDS.includes(n)).length;
  if (reds > blacks + 4) sugs.push('⚫黒');
  else if (blacks > reds + 4) sugs.push('🔴赤');
  const odds = nz.filter(n => n % 2 !== 0).length, evens = nz.filter(n => n % 2 === 0).length;
  if (odds > evens + 3) sugs.push('偶数');
  else if (evens > odds + 3) sugs.push('奇数');
  const lows = nz.filter(n => n <= 18).length, highs = nz.filter(n => n > 18).length;
  if (lows > highs + 3) sugs.push('ハイ19-36');
  else if (highs > lows + 3) sugs.push('ロー1-18');
  const d1 = nz.filter(n => n <= 12).length, d2 = nz.filter(n => n > 12 && n <= 24).length, d3 = nz.filter(n => n > 24).length;
  const avgD = nz.length / 3;
  if (d1 < avgD * 0.4 && nz.length >= 8) sugs.push('1stDZN');
  if (d2 < avgD * 0.4 && nz.length >= 8) sugs.push('2ndDZN');
  if (d3 < avgD * 0.4 && nz.length >= 8) sugs.push('3rdDZN');
  const avgC = nz.length / 3;
  const c1n = nz.filter(n => COL1.includes(n)).length, c2n = nz.filter(n => COL2.includes(n)).length, c3n = nz.filter(n => COL3.includes(n)).length;
  if (c1n < avgC * 0.4 && nz.length >= 8) sugs.push('1列目');
  if (c2n < avgC * 0.4 && nz.length >= 8) sugs.push('2列目');
  if (c3n < avgC * 0.4 && nz.length >= 8) sugs.push('3列目');
  let streak = 1;
  const lc = getClrLabel(history[history.length - 1]);
  if (lc) {
    for (let i = history.length - 2; i >= 0; i--) { if (getClrLabel(history[i]) === lc) streak++; else break; }
    if (streak >= 4) { const opp = lc === '赤' ? '⚫黒' : '🔴赤'; sugs.push(`${opp}そろそろ🔥`); }
  }
  return sugs;
}

// ===== メインレンダー =====
function render() {
  const total = history.length;
  document.getElementById('spinCount').textContent = total;
  document.getElementById('btnUndo').disabled = !total;
  document.getElementById('btnReset').disabled = !total;
  updateHeaderStreak();
  renderHist();
  renderStats();
  renderGrid();
  renderAnalysis();
  renderHist2();
  renderBet();
}

// ===== ヒストリーバー =====
function renderHist() {
  const el = document.getElementById('histStrip');
  if (!history.length) { el.innerHTML = '<span class="emp">↓ 出目を入力</span>'; return; }
  el.innerHTML = history.slice(-50).map((n, i, arr) => {
    const cls = `mc ${getClr(n)}${i === arr.length - 1 ? ' new-entry' : ''}`;
    return `<div class="${cls}">${disp(n)}</div>`;
  }).join('');
  requestAnimationFrame(() => { el.scrollLeft = el.scrollWidth; });
}

// ===== 統計ページ =====
function renderStats() {
  const el = document.getElementById('pageStats');
  const totalAll = history.length;
  if (!totalAll) {
    el.innerHTML = '<div class="empty-state">↓ 出目を入力してください<br><span style="font-size:11px;color:#333">0 / 00 / 1〜36</span></div>';
    return;
  }
  const filtered = getFiltered();
  const total = filtered.length;
  const filterLabel = filterN > 0 ? `直近${filterN}件` : '全データ';
  const nz = filtered.filter(n => n > 0);
  const nzt = nz.length || 1;
  const reds = filtered.filter(n => REDS.includes(n)).length;
  const blacks = filtered.filter(n => n > 0 && !REDS.includes(n)).length;
  const zero0 = filtered.filter(n => n === 0).length;
  const zero00 = filtered.filter(n => n === -1).length;
  const odds = nz.filter(n => n % 2 !== 0).length;
  const evens = nz.filter(n => n % 2 === 0).length;
  const lows = nz.filter(n => n <= 18).length;
  const highs = nz.filter(n => n > 18).length;
  const d1 = nz.filter(n => n <= 12).length, d2 = nz.filter(n => n > 12 && n <= 24).length, d3 = nz.filter(n => n > 24).length;
  const c1 = nz.filter(n => COL1.includes(n)).length, c2 = nz.filter(n => COL2.includes(n)).length, c3 = nz.filter(n => COL3.includes(n)).length;
  const { curStr, curType, maxR, maxB, maxO } = calcStreaks();

  let h = '';

  // フィルター情報 & コピーボタン
  if (filterN > 0 || europeanMode) {
    const tags = [];
    if (filterN > 0) tags.push(`直近${filterN}件`);
    if (europeanMode) tags.push('🇪🇺 EU');
    h += `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;margin-bottom:-2px">
      ${tags.map(t => `<span style="background:rgba(212,168,83,0.12);border:1px solid rgba(212,168,83,0.25);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--gold)">${t}</span>`).join('')}
      <span style="font-size:10px;color:#555;margin-left:auto">${total}スピン集計</span>
    </div>`;
  }

  // レコメンド
  const sugs = getRecs();
  if (total >= 5 && sugs.length) {
    h += `<div class="rec">
      <div class="rec-title">🎯 レコメンド</div>
      <div class="rec-tags">${sugs.slice(0, 5).map(s => `<span class="rec-tag">${s}</span>`).join('')}</div>
      <div class="rec-hint">※各スピンは独立事象です。娯楽目的の予想です。</div>
    </div>`;
  }

  // ストリーク
  const sc = curType === '赤' ? '#ef4444' : curType === '黒' ? '#9ca3af' : curType === '奇' ? '#8b5cf6' : curType === '偶' ? '#0ea5e9' : '#555';
  h += `<div class="cat">

// ===== 統計サマリーコピー =====
function copyStatsSummary() {
  const filtered = getFiltered();
  const total = filtered.length;
  if (!total) { showToast('データがありません'); return; }
  const nz = filtered.filter(n => n > 0);
  const nzt = nz.length || 1;
  const reds = filtered.filter(n => REDS.includes(n)).length;
  const blacks = filtered.filter(n => n > 0 && !REDS.includes(n)).length;
  const zero0 = filtered.filter(n => n === 0).length;
  const zero00 = filtered.filter(n => n === -1).length;
  const odds = nz.filter(n => n % 2 !== 0).length;
  const evens = nz.filter(n => n % 2 === 0).length;
  const lows = nz.filter(n => n <= 18).length;
  const highs = nz.filter(n => n > 18).length;
  const { maxR, maxB } = calcStreaks();
  const label = filterN > 0 ? `直近${filterN}件` : `全${total}スピン`;
  const txt = [
    `🎰 ルーレット統計 [${label}]`,
    `赤: ${reds}回 (${pct(reds,total)}%) / 黒: ${blacks}回 (${pct(blacks,total)}%) / 0: ${zero0}回 / 00: ${zero00}回`,
    `奇: ${odds}回 (${pct(odds,nzt)}%) / 偶: ${evens}回 (${pct(evens,nzt)}%)`,
    `Lo: ${lows}回 (${pct(lows,nzt)}%) / Hi: ${highs}回 (${pct(highs,nzt)}%)`,
    `最長赤連続: ${maxR} / 最長黒連続: ${maxB}`,
  ].join('\n');
  navigator.clipboard.writeText(txt).then(() => showToast('統計をコピーしました')).catch(() => showToast('コピー失敗'));
}

// ===== グリッドページ =====
function renderGrid() {
  const el = document.getElementById('pageGrid');
  const totalAll = history.length;
  if (!totalAll) {
    el.innerHTML = '<div class="empty-state">出目を入力するとグリッドが表示されます</div>';
    return;
  }

  // フィルター後の履歴で集計
  const filtered = getFiltered();
  const total = filtered.length;

  // 各数字の出現回数 (フィルター適用後)
  const counts = {};
  for (const n of filtered) counts[n] = (counts[n] || 0) + 1;
  const maxCnt = Math.max(...Object.values(counts), 1);

  // デューナンバー: 各数字が最後に出たのは何スピン前か (全履歴で計算)
  const lastSeen = {};
  history.forEach((n, i) => { lastSeen[n] = history.length - 1 - i; }); // 小さいほど最近
  // 実際には最後に出たインデックスを記録
  const lastSeenIdx = {};
  history.forEach((n, i) => { lastSeenIdx[n] = i; });
  const getDue = n => {
    if (lastSeenIdx[n] === undefined) return history.length; // 一度も出ていない
    return history.length - 1 - lastSeenIdx[n]; // 何スピン前か
  };

  // ホット/コールド
  const allNums = [0, -1, ...Array.from({ length: 36 }, (_, i) => i + 1)];
  const sortedHot = [...allNums].sort((a, b) => (counts[b] || 0) - (counts[a] || 0));
  const sortedCold = [...allNums].sort((a, b) => (counts[a] || 0) - (counts[b] || 0));

  // 未出数字数
  const neverSeen = allNums.filter(n => !counts[n]);

  let h = '';

  // ホット/コールドナンバー
  h += `<div class="cat">
    <div class="cat-label">🔥 ホット / 🧊 コールド <span class="cat-sub">${total}スピン集計</span></div>
    <div class="hc-row">
      <div class="hc-col" style="background:rgba(255,107,53,0.07);border:1px solid rgba(255,107,53,0.18);border-radius:6px">
        <div class="hc-title" style="color:var(--hot)">🔥 HOT TOP5</div>
        <div class="hc-nums">`;
  sortedHot.slice(0, 5).filter(n => (counts[n] || 0) > 0).forEach(n => {
    const cnt = counts[n] || 0;
    const w = Math.round(cnt / maxCnt * 100);
    const clr = getClr(n);
    const bg = clr === 'r' ? '#dc2626' : clr === 'b' ? '#404060' : '#16a34a';
    h += `<div class="hc-item">
      <div class="hc-ball" style="background:${bg}">${disp(n)}</div>
      <div class="hc-bar-wrap"><div class="hc-bar" style="width:${w}%;background:var(--hot)"></div></div>
      <div class="hc-cnt">${cnt}</div>
    </div>`;
  });
  h += `</div></div>
      <div class="hc-col" style="background:rgba(96,165,250,0.07);border:1px solid rgba(96,165,250,0.18);border-radius:6px">
        <div class="hc-title" style="color:var(--cold)">🧊 COLD TOP5</div>
        <div class="hc-nums">`;
  sortedCold.slice(0, 5).forEach(n => {
    const cnt = counts[n] || 0;
    const clr = getClr(n);
    const bg = clr === 'r' ? '#dc2626' : clr === 'b' ? '#404060' : '#16a34a';
    h += `<div class="hc-item">
      <div class="hc-ball" style="background:${bg}">${disp(n)}</div>
      <div class="hc-bar-wrap"><div class="hc-bar" style="width:${cnt === 0 ? 0 : Math.round(cnt / maxCnt * 100)}%;background:var(--cold)"></div></div>
      <div class="hc-cnt">${cnt}</div>
    </div>`;
  });
  h += `</div></div></div></div>`;

  // 未出数字ハイライト情報
  if (neverSeen.length > 0) {
    h += `<div class="cat" style="border-color:rgba(212,168,83,0.2)">
      <div class="cat-label" style="color:#f59e0b">⚠️ 未出数字 <span class="cat-sub">${neverSeen.length}個</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">`;
    neverSeen.forEach(n => {
      const clr = getClr(n);
      const bg = clr === 'r' ? 'rgba(220,38,38,0.2)' : clr === 'b' ? 'rgba(60,60,100,0.3)' : 'rgba(22,163,74,0.2)';
      const textC = clr === 'r' ? '#ef4444' : clr === 'b' ? '#9ca3af' : '#22c55e';
      h += `<span style="background:${bg};border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:${textC};border:1px dashed ${textC}">${disp(n)}</span>`;
    });
    h += `</div></div>`;
  }

  // デュートップ5（最も長く出ていない数字）
  const dueList = allNums.map(n => ({n, due: getDue(n)})).sort((a, b) => b.due - a.due).slice(0, 5);
  h += `<div class="cat">
    <div class="cat-label">⏳ デューナンバー <span class="cat-sub">最も長く出ていない数字</span></div>
    <div style="display:flex;flex-direction:column;gap:4px">`;
  dueList.forEach(({n, due}) => {
    const clr = getClr(n);
    const bg = clr === 'r' ? '#dc2626' : clr === 'b' ? '#404060' : '#16a34a';
    const barW = Math.min(due / Math.max(history.length, 1) * 100, 100);
    const dueColor = due > 20 ? '#f59e0b' : due > 10 ? '#888' : '#555';
    h += `<div style="display:flex;align-items:center;gap:6px">
      <div style="width:24px;height:24px;border-radius:50%;background:${bg};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:'DM Mono',monospace">${disp(n)}</div>
      <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:3px;height:7px;overflow:hidden">
        <div style="width:${barW}%;height:100%;background:${dueColor};border-radius:3px;transition:width .4s ease"></div>
      </div>
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:${dueColor};width:36px;text-align:right">${due === history.length ? '未出' : due + '前'}</div>
    </div>`;
  });
  h += `</div></div>`;

  // 全数字グリッド
  h += `<div class="cat">
    <div class="cat-label">🔢 全数字グリッド <span class="cat-sub">塗り=頻度 / ★=未出</span></div>
    <div class="num-grid">`;

  [[0,'0','g-cell'], [-1,'00','g-cell']].forEach(([n, l, cls]) => {
    const cnt = counts[n] || 0;
    const fillH = maxCnt > 0 ? Math.round(cnt / maxCnt * 100) : 0;
    const due = getDue(n);
    const neverClass = cnt === 0 ? ' never-seen' : '';
    const dueStr = cnt === 0 ? '未出' : due + '前';
    const dueClr = due > 15 ? '#f59e0b' : 'rgba(255,255,255,0.35)';
    h += `<div class="ng-cell ${cls}${neverClass}" onclick="window._addNum(${n});if(navigator.vibrate)navigator.vibrate(30)">
      <div class="ng-fill" style="height:${fillH}%"></div>
      <div class="ng-num">${l}</div>
      <div class="ng-cnt">${cnt}</div>
      <div class="ng-due" style="color:${dueClr}">${dueStr}</div>
    </div>`;
  });

  for (let n = 1; n <= 36; n++) {
    const cnt = counts[n] || 0;
    const fillH = maxCnt > 0 ? Math.round(cnt / maxCnt * 100) : 0;
    const cls = REDS.includes(n) ? 'r-cell' : 'b-cell';
    const due = getDue(n);
    const neverClass = cnt === 0 ? ' never-seen' : '';
    const dueStr = cnt === 0 ? '未出' : due + '前';
    const dueClr = due > 15 ? '#f59e0b' : 'rgba(255,255,255,0.35)';
    h += `<div class="ng-cell ${cls}${neverClass}" onclick="window._addNum(${n});if(navigator.vibrate)navigator.vibrate(30)">
      <div class="ng-fill" style="height:${fillH}%"></div>
      <div class="ng-num">${n}</div>
      <div class="ng-cnt">${cnt}</div>
      <div class="ng-due" style="color:${dueClr}">${dueStr}</div>
    </div>`;
  }
  h += `</div>
    <div style="font-size:10px;color:#444;margin-top:4px;text-align:center">タップして入力 / ★点線=未出</div>
  </div>`;

  el.innerHTML = h;
}
window._addNum = function(n) {
  addNum(n);
  showToast(`${disp(n)} を入力`);
  if (navigator.vibrate) navigator.vibrate(30);
};

  const zero00 = history.filter(n => n === -1).length;
  const odds = nz.filter(n => n % 2 !== 0).length;
  const evens = nz.filter(n => n % 2 === 0).length;
  const lows = nz.filter(n => n <= 18).length;
  const highs = nz.filter(n => n > 18).length;
  const d1 = nz.filter(n => n <= 12).length, d2 = nz.filter(n => n > 12 && n <= 24).length, d3 = nz.filter(n => n > 24).length;
  const c1 = nz.filter(n => COL1.includes(n)).length, c2 = nz.filter(n => COL2.includes(n)).length, c3 = nz.filter(n => COL3.includes(n)).length;

  // セッション時間
  let timeStr = '—', speedStr = '—';
  if (sessionStart) {
    const sec = Math.floor((Date.now() - sessionStart) / 1000);
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    timeStr = `${m}:${s}`;
    if (total >= 2 && sec > 0) {
      const spm = (total / (sec / 60)).toFixed(1);
      speedStr = `${spm}/分`;
    }
  }

  const devRows = [
    { label: '赤 (47.4%)', count: reds, total, expected: 47.37 },
    { label: '黒 (47.4%)', count: blacks, total, expected: 47.37 },
    { label: '0 (2.6%)', count: zero0, total, expected: 2.63 },
    { label: '00 (2.6%)', count: zero00, total, expected: 2.63 },
    { label: '奇数 (50%)', count: odds, total: nzt, expected: 50 },
    { label: '偶数 (50%)', count: evens, total: nzt, expected: 50 },
    { label: 'Lo (50%)', count: lows, total: nzt, expected: 50 },
    { label: 'Hi (50%)', count: highs, total: nzt, expected: 50 },
    { label: '1stDZN(33%)', count: d1, total: nzt, expected: 33.33 },
    { label: '2ndDZN(33%)', count: d2, total: nzt, expected: 33.33 },
    { label: '3rdDZN(33%)', count: d3, total: nzt, expected: 33.33 },
    { label: '1列目 (33%)', count: c1, total: nzt, expected: 33.33 },
    { label: '2列目 (33%)', count: c2, total: nzt, expected: 33.33 },
    { label: '3列目 (33%)', count: c3, total: nzt, expected: 33.33 },
  ];

  let h = '';

  // セッション情報
  h += `<div class="cat">
    <div class="cat-label">⏱ セッション情報</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">
      <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:22px;font-weight:800;font-family:'DM Mono',monospace;color:var(--gold)">${total}</div>
        <div style="font-size:10px;color:#555">総スピン</div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;font-family:'DM Mono',monospace;color:#60a5fa" id="analysisTime">${timeStr}</div>
        <div style="font-size:10px;color:#555">経過時間</div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:#f59e0b">${speedStr}</div>
        <div style="font-size:10px;color:#555">ペース</div>
      </div>
    </div>
  </div>`;

  // 逸脱度テーブル
  h += `<div class="cat">
    <div class="cat-label">📏 期待値からの逸脱度 <span class="cat-sub">縦線=理論値</span></div>`;
  devRows.forEach(({ label, count, total: t, expected }) => {
    const actual = t > 0 ? count / t * 100 : 0;
    const diff = actual - expected;
    const sign = diff >= 0 ? '+' : '';
    const barW = Math.min(actual, 100);
    const expW = Math.min(expected, 100);
    const color = Math.abs(diff) < 3 ? '#555' : diff > 0 ? '#f59e0b' : '#60a5fa';
    h += `<div class="dev-row">
      <div class="dev-label">${label}</div>
      <div class="dev-bar-wrap">
        <div class="dev-actual" style="width:${barW}%;background:${color}"></div>
        <div class="dev-expected" style="left:${expW}%"></div>
      </div>
      <div class="dev-pct">${actual.toFixed(1)}%</div>
      <div class="dev-diff" style="color:${color}">${sign}${diff.toFixed(1)}</div>
    </div>`;
  });
  h += `</div>`;

  // 直近トレンドバーチャート
  if (total >= 5) {
    const last20 = history.slice(-20);
    const l20t = last20.length;
    const l20r = last20.filter(n => REDS.includes(n)).length;
    const l20b = last20.filter(n => n > 0 && !REDS.includes(n)).length;
    const l20g = last20.filter(n => n <= 0).length;
    h += `<div class="cat">
      <div class="cat-label">📊 直近${l20t}スピンのトレンド</div>
      <div style="display:flex;gap:2px;height:48px;align-items:flex-end;margin-bottom:6px">`;
    last20.forEach(n => {
      const clr = getClr(n);
      const bg = clr === 'r' ? '#dc2626' : clr === 'b' ? '#404060' : '#16a34a';
      h += `<div style="flex:1;background:${bg};border-radius:2px 2px 0 0;min-height:5px;height:48px;opacity:0.7"></div>`;
    });
    h += `</div>
      <div style="display:flex;gap:10px;font-size:11px">
        <span style="color:#ef4444">赤 ${l20r}回 (${pct(l20r,l20t)}%)</span>
        <span style="color:#9ca3af">黒 ${l20b}回 (${pct(l20b,l20t)}%)</span>
        <span style="color:#16a34a">0/00 ${l20g}回 (${pct(l20g,l20t)}%)</span>
      </div>
    </div>`;
  }

  // 長帯びストリーク詳細
  if (total >= 10) {
    const { maxR, maxB, maxO, maxE, maxL, maxH } = calcStreaks();
    const streakItems = [
      { label: '赤連続', val: maxR, color: '#ef4444', bg: 'rgba(220,38,38,0.07)' },
      { label: '黒連続', val: maxB, color: '#9ca3af', bg: 'rgba(80,80,130,0.1)' },
      { label: '奇連続', val: maxO, color: '#8b5cf6', bg: 'rgba(139,92,246,0.07)' },
      { label: '偶連続', val: maxE, color: '#0ea5e9', bg: 'rgba(14,165,233,0.07)' },
      { label: 'Lo連続', val: maxL, color: '#f59e0b', bg: 'rgba(245,158,11,0.07)' },
      { label: 'Hi連続', val: maxH, color: '#10b981', bg: 'rgba(16,185,129,0.07)' },
    ];
    const maxStreak = Math.max(...streakItems.map(s => s.val), 1);
    h += `<div class="cat">
      <div class="cat-label">📈 最長ストリーク詳細</div>
      <div style="display:flex;flex-direction:column;gap:5px">`;
    streakItems.forEach(({ label, val, color, bg }) => {
      const barW = Math.round(val / maxStreak * 100);
      h += `<div style="display:flex;align-items:center;gap:6px">
        <div style="width:52px;font-size:10px;color:${color};flex-shrink:0">${label}</div>
        <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:3px;height:8px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${color};border-radius:3px;transition:width .4s ease;opacity:0.7"></div>
        </div>
        <div style="font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:${color};width:24px;text-align:right">${val}</div>
      </div>`;
    });
    h += `</div></div>`;
  }

  // ホイールセクター分析
  if (total >= 5) {
    const sectorCounts = WHEEL_SECTORS.map(s => ({
      ...s,
      count: history.filter(n => s.nums.includes(n)).length,
    }));
    const maxSector = Math.max(...sectorCounts.map(s => s.count), 1);
    h += `<div class="cat">
      <div class="cat-label">🎡 ホイールセクター分析</div>
      <div style="display:flex;flex-direction:column;gap:5px">`;
    sectorCounts.forEach(({ name, count, color, nums }) => {
      const expected = nums.length / 38 * total;
      const barW = Math.round(count / maxSector * 100);
      const devPct = expected > 0 ? ((count - expected) / expected * 100) : 0;
      const devColor = Math.abs(devPct) < 15 ? '#555' : devPct > 0 ? '#f59e0b' : '#60a5fa';
      const sign = devPct >= 0 ? '+' : '';
      h += `<div style="display:flex;align-items:center;gap:6px">
        <div style="width:3px;height:20px;background:${color};border-radius:2px;flex-shrink:0"></div>
        <div style="font-size:9px;color:#888;width:72px;flex-shrink:0;line-height:1.2">${name}</div>
        <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:3px;height:7px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${color};border-radius:3px;opacity:0.7;transition:width .4s ease"></div>
        </div>
        <div style="font-size:10px;font-family:'DM Mono',monospace;color:#aaa;width:20px;text-align:right">${count}</div>
        <div style="font-size:9px;font-family:'DM Mono',monospace;color:${devColor};width:36px;text-align:right">${sign}${devPct.toFixed(0)}%</div>
      </div>`;
    });
    h += `</div></div>`;
  }

  // 連続パターン検出
  if (total >= 15) {
    // 赤黒の交互パターンを検出
    let altCount = 0, prevClr = null;
    let maxAltRun = 0, curAltRun = 0;
    history.forEach(n => {
      const clr = getClrLabel(n);
      if (!clr) { curAltRun = 0; prevClr = null; return; }
      if (prevClr && clr !== prevClr) { curAltRun++; maxAltRun = Math.max(maxAltRun, curAltRun); }
      else { curAltRun = 0; }
      prevClr = clr;
      altCount++;
    });
    // ゼロ出現サイクル
    const zeroIdxs = [];
    history.forEach((n, i) => { if (n === 0 || n === -1) zeroIdxs.push(i); });
    const zeroCycles = [];
    for (let i = 1; i < zeroIdxs.length; i++) zeroCycles.push(zeroIdxs[i] - zeroIdxs[i-1]);
    const avgZeroCycle = zeroCycles.length > 0 ? Math.round(zeroCycles.reduce((a, b) => a + b, 0) / zeroCycles.length) : 0;
    const sinceLastZero = zeroIdxs.length > 0 ? history.length - 1 - zeroIdxs[zeroIdxs.length - 1] : history.length;
    h += `<div class="cat">
      <div class="cat-label">🔍 パターン分析</div>
      <div style="display:flex;flex-direction:column;gap:6px;font-size:12px">
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="color:#888">最長交互(赤黒)</span>
          <span style="color:#f59e0b;font-family:'DM Mono',monospace;font-weight:700">${maxAltRun}回</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="color:#888">0/00 平均サイクル</span>
          <span style="color:#22c55e;font-family:'DM Mono',monospace;font-weight:700">${avgZeroCycle > 0 ? avgZeroCycle + '回に1回' : '計算中'}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="color:#888">0/00 が出てから</span>
          <span style="color:${sinceLastZero > 20 ? '#f59e0b' : '#888'};font-family:'DM Mono',monospace;font-weight:700">${sinceLastZero}スピン経過</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 0">
          <span style="color:#888">総スピン数</span>
          <span style="color:var(--gold);font-family:'DM Mono',monospace;font-weight:700">${total}</span>
        </div>
      </div>
    </div>`;
  }

  // アメリカンルーレット配当・確率一覧
  h += `<div class="cat">
    <div class="cat-label">📐 アメリカンルーレット 配当率</div>
    <div style="font-size:10px;color:#555;margin-bottom:6px">38マス (0, 00, 1〜36) / ハウスエッジ: 5.26%</div>
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr>
        <th style="text-align:left;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--gdim);font-size:10px">ベット種</th>
        <th style="text-align:right;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--gdim);font-size:10px">配当</th>
        <th style="text-align:right;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--gdim);font-size:10px">確率</th>
        <th style="text-align:right;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--gdim);font-size:10px">期待値</th>
      </tr></thead>
      <tbody>
        ${[
          ['赤 / 黒', '1:1', '18/38 (47.4%)', '-5.26%'],
          ['奇数 / 偶数', '1:1', '18/38 (47.4%)', '-5.26%'],
          ['Lo / Hi', '1:1', '18/38 (47.4%)', '-5.26%'],
          ['ダズン / カラム', '2:1', '12/38 (31.6%)', '-5.26%'],
          ['シングルNo.', '35:1', '1/38 (2.6%)', '-5.26%'],
          ['スプリット (2)', '17:1', '2/38 (5.3%)', '-5.26%'],
          ['ストリート (3)', '11:1', '3/38 (7.9%)', '-5.26%'],
          ['コーナー (4)', '8:1', '4/38 (10.5%)', '-5.26%'],
          ['ファースト5 (5)', '6:1', '5/38 (13.2%)', '-7.89%'],
          ['ライン (6)', '5:1', '6/38 (15.8%)', '-5.26%'],
        ].map(([name, odds, prob, ev]) =>
          `<tr>
            <td style="padding:4px 4px;border-bottom:1px solid rgba(255,255,255,0.04);color:#aaa">${name}</td>
            <td style="padding:4px 4px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;font-family:'DM Mono',monospace;color:var(--gold);font-weight:700">${odds}</td>
            <td style="padding:4px 4px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;font-family:'DM Mono',monospace;color:#888">${prob}</td>
            <td style="padding:4px 4px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;font-family:'DM Mono',monospace;color:#ef4444">${ev}</td>
          </tr>`
        ).join('')}
      </tbody>
    </table>
  </div>`;

  el.innerHTML = h;
}

// ===== 履歴テーブルページ =====
function renderHist2() {
  const el = document.getElementById('pageHist');
  if (!history.length) {
    el.innerHTML = '<div class="empty-state">出目を入力すると履歴が表示されます</div>';
    return;
  }
  const recent = [...history].reverse().slice(0, 100);
  let h = `<div class="cat">
    <div class="cat-label">📋 スピン履歴 <span class="cat-sub">最新${Math.min(history.length,100)}件</span></div>
    <table class="hist-table">
      <thead><tr>
        <th>#</th><th>数字</th><th>色</th><th>奇/偶</th><th>Lo/Hi</th>
      </tr></thead>
      <tbody>`;
  recent.forEach((n, i) => {
    const spin = history.length - i;
    const clr = getClr(n);
    const bg = clr === 'r' ? '#dc2626' : clr === 'b' ? '#404060' : '#16a34a';
    const clrLabel = clr === 'r' ? '赤' : clr === 'b' ? '黒' : '—';
    const oddeven = n > 0 ? (n % 2 !== 0 ? '奇' : '偶') : '—';
    const lohi = n > 0 ? (n <= 18 ? 'Lo' : 'Hi') : '—';
    const rowBg = i === 0 ? 'rgba(212,168,83,0.06)' : '';
    h += `<tr style="background:${rowBg}">
      <td style="color:#444;font-size:10px">${spin}</td>
      <td><div class="hist-ball" style="background:${bg}">${disp(n)}</div></td>
      <td style="color:${clr === 'r' ? '#ef4444' : clr === 'b' ? '#9ca3af' : '#22c55e'}">${clrLabel}</td>
      <td style="color:${oddeven === '奇' ? '#8b5cf6' : '#0ea5e9'}">${oddeven}</td>
      <td style="color:${lohi === 'Lo' ? '#f59e0b' : '#10b981'}">${lohi}</td>
    </tr>`;
  });
  h += `</tbody></table>`;
  if (history.length > 100) h += `<div style="text-align:center;font-size:10px;color:#444;padding:6px">… 残り ${history.length - 100} 件 (エクスポートで全件確認)</div>`;
  h += `</div>`;
  el.innerHTML = h;
}

// ===== ベット追跡ページ =====
function renderBet() {
  const el = document.getElementById('pageBet');
  const betOptions = [
    { key: 'red',   label: '🔴 赤', color: '#ef4444' },
    { key: 'black', label: '⚫ 黒', color: '#9ca3af' },
    { key: 'odd',   label: '奇数', color: '#8b5cf6' },
    { key: 'even',  label: '偶数', color: '#0ea5e9' },
    { key: 'low',   label: 'Lo 1-18', color: '#f59e0b' },
    { key: 'high',  label: 'Hi 19-36', color: '#10b981' },
  ];
  const total = betWins + betLosses + betPushes;
  const winRate = total > 0 ? (betWins / total * 100).toFixed(1) : '0.0';
  const profit = betWins - betLosses;
  const profitColor = profit > 0 ? '#10b981' : profit < 0 ? '#ef4444' : '#888';

  let h = `<div class="cat">
    <div class="cat-label">💰 仮想ベット追跡</div>
    <div style="font-size:11px;color:#555;margin-bottom:8px">ベット対象を選択して出目を入力すると自動で勝敗を記録します</div>
    <div class="bet-row">`;
  betOptions.forEach(({key, label, color}) => {
    const sel = betType === key;
    h += `<button class="bet-btn${sel ? ' selected' : ''}" onclick="setBet('${key}')" style="${sel ? `border-color:${color};color:${color};` : ''}">${label}</button>`;
  });
  h += `</div>`;
  if (betType) {
    const found = betOptions.find(b => b.key === betType);
    h += `<div style="font-size:11px;color:var(--gdim);margin-bottom:8px">現在: <strong style="color:var(--gold)">${found ? found.label : betType}</strong> にベット中</div>`;
  }
  h += `</div>`;

  h += `<div class="cat">
    <div class="cat-label">📊 結果</div>
    <div class="bet-stat-row">
      <div class="bet-stat">
        <div class="bet-stat-val" style="color:#10b981">${betWins}</div>
        <div class="bet-stat-lbl">勝利</div>
      </div>
      <div class="bet-stat">
        <div class="bet-stat-val" style="color:#ef4444">${betLosses}</div>
        <div class="bet-stat-lbl">敗北</div>
      </div>
      <div class="bet-stat">
        <div class="bet-stat-val" style="color:#888">${betPushes}</div>
        <div class="bet-stat-lbl">引分(0/00)</div>
      </div>
      <div class="bet-stat">
        <div class="bet-stat-val" style="color:#60a5fa">${winRate}%</div>
        <div class="bet-stat-lbl">勝率</div>
      </div>
    </div>
    <div style="margin-top:10px;text-align:center">
      <span style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:${profitColor}">${profit >= 0 ? '+' : ''}${profit}</span>
      <span style="font-size:11px;color:#555;margin-left:4px">損益 (1ユニット計算)</span>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button onclick="resetBet()" style="padding:5px 16px;border-radius:6px;border:1px solid rgba(220,38,38,0.3);background:none;color:#dc2626;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif">リセット</button>
    </div>
  </div>`;

  // 最近の結果履歴（ベット済みスピンのみ）
  if (history.length > 0 && betType) {
    h += `<div class="cat">
      <div class="cat-label">📋 直近の結果</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">`;
    history.slice(-30).reverse().forEach(n => {
      const res = getBetResult(n, betType);
      const bg = res === 'win' ? 'rgba(16,185,129,0.2)' : res === 'loss' ? 'rgba(239,68,68,0.2)' : 'rgba(255,255,255,0.05)';
      const border = res === 'win' ? '#10b981' : res === 'loss' ? '#ef4444' : '#444';
      const clr = getClr(n);
      const ballBg = clr === 'r' ? '#dc2626' : clr === 'b' ? '#404060' : '#16a34a';
      h += `<div style="background:${bg};border:1px solid ${border};border-radius:6px;padding:3px 6px;display:flex;align-items:center;gap:3px">
        <div style="width:16px;height:16px;border-radius:50%;background:${ballBg};font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace">${disp(n)}</div>
        <span style="font-size:9px;color:${border}">${res === 'win' ? '◎' : res === 'loss' ? '✕' : '△'}</span>
      </div>`;
    });
    h += `</div></div>`;
  }

  // デューナンバーベースのサイクル分析
  if (history.length >= 10) {
    // 各ベット対象の最後の出現からのスピン数
    const lastIdxMap = {};
    history.forEach((n, i) => { lastIdxMap[n] = i; });
    const sinceRed = history.length - 1 - Math.max(...REDS.map(n => lastIdxMap[n] ?? -1));
    const sinceBlack = history.length - 1 - Math.max(...Array.from({length:36},(_, i)=>i+1).filter(n=>!REDS.includes(n)).map(n => lastIdxMap[n] ?? -1));
    const nzIdxs = history.map((n,i)=>n>0?i:-1).filter(i=>i>=0);
    const lastNzIdx = nzIdxs.length > 0 ? nzIdxs[nzIdxs.length-1] : -1;
    const lastNzNum = lastNzIdx >= 0 ? history[lastNzIdx] : null;
    const sinceOdd = lastNzNum !== null ? (lastNzNum % 2 !== 0 ? 0 : history.length - 1 - Math.max(...history.map((n,i)=>n>0&&n%2!==0?i:-1).filter(i=>i>=0))) : history.length;
    const sinceEven = lastNzNum !== null ? (lastNzNum % 2 === 0 ? 0 : history.length - 1 - Math.max(...history.map((n,i)=>n>0&&n%2===0?i:-1).filter(i=>i>=0))) : history.length;
    const sinceLo = history.length - 1 - Math.max(...history.map((n,i)=>n>0&&n<=18?i:-1).filter(i=>i>=0),-1);
    const sinceHi = history.length - 1 - Math.max(...history.map((n,i)=>n>0&&n>18?i:-1).filter(i=>i>=0),-1);

    const dueItems = [
      { key:'red', label:'🔴 赤', due: sinceRed },
      { key:'black', label:'⚫ 黒', due: sinceBlack },
      { key:'odd', label:'奇数', due: sinceOdd },
      { key:'even', label:'偶数', due: sinceEven },
      { key:'low', label:'Lo', due: sinceLo },
      { key:'high', label:'Hi', due: sinceHi },
    ].sort((a,b) => b.due - a.due);

    const maxDue = Math.max(...dueItems.map(d=>d.due), 1);
    h += `<div class="cat">
      <div class="cat-label">⏳ デューサイクル分析 <span class="cat-sub">最後に出てから何スピン経過</span></div>
      <div style="display:flex;flex-direction:column;gap:5px">`;
    dueItems.forEach(({key, label, due}) => {
      const barW = Math.round(due / maxDue * 100);
      const dueColor = due >= 5 ? '#f59e0b' : due >= 3 ? '#888' : '#555';
      const isSel = betType === key;
      h += `<div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="setBet('${key}')">
        <div style="font-size:11px;${isSel ? 'color:var(--gold);font-weight:700' : 'color:#888'};width:54px;flex-shrink:0">${label}${isSel ? '✓' : ''}</div>
        <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:3px;height:7px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${dueColor};border-radius:3px;transition:width .4s ease"></div>
        </div>
        <div style="font-size:11px;font-family:'DM Mono',monospace;color:${dueColor};width:40px;text-align:right">${due}スピン</div>
      </div>`;
    });
    h += `</div>
      <div style="font-size:10px;color:#444;margin-top:6px">※ タップでそのカテゴリにベット設定</div>
    </div>`;
  }

  el.innerHTML = h;
}

function getBetResult(n, type) {
  if (n === 0 || n === -1) return 'push'; // 0/00はプッシュ（ハウスウィン）
  switch (type) {
    case 'red':   return REDS.includes(n) ? 'win' : 'loss';
    case 'black': return (!REDS.includes(n) && n > 0) ? 'win' : 'loss';
    case 'odd':   return n % 2 !== 0 ? 'win' : 'loss';
    case 'even':  return n % 2 === 0 ? 'win' : 'loss';
    case 'low':   return n <= 18 ? 'win' : 'loss';
    case 'high':  return n > 18 ? 'win' : 'loss';
    default: return 'push';
  }
}

function setBet(type) {
  betType = type;
  saveBet();
  renderBet();
  showToast(`${type} にベット設定`);
}

function resetBet() {
  if (!confirm('ベット記録をリセットしますか？')) return;
  betWins = 0; betLosses = 0; betPushes = 0;
  saveBet(); renderBet();
  showToast('ベット記録をリセット');
}

// ===== 初期化 =====
render();

// ===== PWAインストールプロンプト =====
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('btnInstall').onclick = () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(r => {
    if (r.outcome === 'accepted') {
      document.getElementById('installBanner').classList.remove('show');
      showToast('インストール完了！');
    }
    deferredInstallPrompt = null;
  });
};
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// ===== キーボードショートカット =====
(function setupKeyboard() {
  const tabs = ['Stats','Grid','Analysis','Hist','Bet'];
  let currentTabIdx = 0;

  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    // 入力フィールド内は数字キーのみ通常処理
    if (tag === 'INPUT' || tag === 'TEXTAREA') {
      if (e.key === 'Enter') { submitInput(); return; }
      return;
    }
    if (e.key === '?' || e.key === '/') {
      e.preventDefault();
      document.getElementById('helpOverlay').classList.toggle('show');
      return;
    }
    if (e.key === 'Escape') {
      document.getElementById('helpOverlay').classList.remove('show');
      document.getElementById('modalOverlay').classList.add('hidden');
      return;
    }
    if (e.key === 'Backspace' && history.length) {
      e.preventDefault();
      history.pop(); save(); render(); showToast('1件削除');
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      currentTabIdx = (currentTabIdx + 1) % tabs.length;
      document.querySelectorAll('.tab')[currentTabIdx].click();
      return;
    }
    if (e.key === 'q' || e.key === 'Q') {
      document.getElementById('btnQuick').click();
      return;
    }
    // 数字キー
    if (/^\d$/.test(e.key)) {
      document.getElementById('numInput').focus();
    }
  });
})();

// ===== ベット保存 =====
function saveBet() {
  try { localStorage.setItem('rt5_bet', JSON.stringify({t:betType,w:betWins,l:betLosses,p:betPushes})); } catch(e) {}
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
