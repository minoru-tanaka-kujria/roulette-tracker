<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>Roulette Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--gold:#d4a853;--gdim:#886b30;--bg:#0b0b14;--sf:#13131f;--red:#dc2626;--blk:#1e1e32;--grn:#16a34a;--sab:env(safe-area-inset-bottom,0px)}
  html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg)}
  body{font-family:'Noto Sans JP',sans-serif;color:#e0d8c8;display:flex;flex-direction:column;max-width:480px;margin:0 auto;height:100dvh;overflow:hidden}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:linear-gradient(180deg,rgba(212,168,83,0.06),transparent);border-bottom:1px solid rgba(212,168,83,0.1);flex-shrink:0}
  .hdr-left{display:flex;align-items:center;gap:10px}
  .hdr-title{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px}
  .hdr-count{font-size:22px;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace}
  .hdr-count span{font-size:11px;color:var(--gdim);font-weight:400}
  .hdr-right{display:flex;align-items:center;gap:6px}
  .hdr-btn{background:none;border:1px solid rgba(212,168,83,0.25);color:var(--gdim);border-radius:5px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
  .hdr-btn:disabled{opacity:.25}.hdr-btn.danger{border-color:rgba(220,38,38,0.3);color:#dc2626}

  /* HISTORY */
  .hist{display:flex;gap:3px;padding:6px 14px;overflow-x:auto;flex-shrink:0;background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.03);scrollbar-width:none;min-height:34px;align-items:center}
  .hist::-webkit-scrollbar{display:none}
  .hist .emp{font-size:13px;color:#555}
  .mc{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;border:1.5px solid rgba(212,168,83,0.4)}
  .mc.r{background:var(--red)}.mc.b{background:var(--blk)}.mc.g{background:var(--grn)}

  /* MID AREA */
  .mid{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:6px;min-height:0;scrollbar-width:none}
  .mid::-webkit-scrollbar{display:none}

  /* Category card */
  .cat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 10px}
  .cat-label{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:6px}

  /* 2-way split */
  .split2{display:flex;gap:5px}
  .split2 .s2-item{flex:1;border-radius:6px;padding:6px 10px}
  .s2-top{display:flex;align-items:baseline;justify-content:space-between}
  .s2-label{font-size:15px;font-weight:700}
  .s2-count{font-size:28px;font-weight:800;font-family:'DM Mono',monospace}
  .s2-pct{font-size:18px;font-family:'DM Mono',monospace;font-weight:700}
  .s2-bar{height:6px;border-radius:3px;margin-top:5px;overflow:hidden;display:flex}

  /* 4-way split (red, black, 0, 00) */
  .split4{display:flex;gap:4px}
  .split4 .s4-item{flex:1;border-radius:6px;padding:6px 8px}
  .s4-label{font-size:14px;font-weight:700}
  .s4-count{font-size:26px;font-weight:800;font-family:'DM Mono',monospace}
  .s4-pct{font-size:16px;font-family:'DM Mono',monospace;font-weight:700}
  .s4-zero{max-width:25%}

  /* 3-way split */
  .split3{display:flex;gap:5px}
  .split3 .s3-item{flex:1;border-radius:6px;padding:6px 8px;text-align:center}
  .s3-label{font-size:14px;font-weight:700}
  .s3-count{font-size:26px;font-weight:800;font-family:'DM Mono',monospace}
  .s3-pct{font-size:15px;font-family:'DM Mono',monospace;font-weight:600;opacity:.8}
  .s3-nums{font-size:9px;color:rgba(255,255,255,0.35);margin-top:2px;line-height:1.3}

  /* Recommend */
  .rec{background:rgba(212,168,83,0.08);border:1px solid rgba(212,168,83,0.2);border-radius:8px;padding:8px 10px}
  .rec-title{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:4px}
  .rec-tags{display:flex;gap:5px;flex-wrap:wrap}
  .rec-tag{background:rgba(212,168,83,0.15);border-radius:5px;padding:3px 10px;font-weight:700;font-size:15px;color:var(--gold);white-space:nowrap}
  .rec-hint{font-size:11px;color:var(--gdim);margin-top:4px}

  /* INPUT BAR */
  .input-bar{flex-shrink:0;padding:8px 12px calc(8px + var(--sab));background:var(--sf);border-top:1px solid rgba(212,168,83,0.1);display:flex;align-items:center;gap:8px}
  .input-bar input{flex:1;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(212,168,83,0.25);color:#e0d8c8;font-size:20px;font-family:'DM Mono',monospace;outline:none;text-align:center;caret-color:var(--gold)}
  .input-bar input::placeholder{color:#555;font-size:15px}
  .input-bar input:focus{border-color:var(--gold);background:rgba(255,255,255,0.1)}
  .input-bar .submit-btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#d4a853,#b8912e);color:#0b0b14;font-weight:700;font-size:16px;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
  .input-bar .submit-btn:active{transform:scale(.95)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">ROULETTE</div>
    <div class="hdr-count"><span>SPINS</span> <span id="spinCount">0</span></div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" id="btnUndo" disabled>↩ 戻す</button>
    <button class="hdr-btn danger" id="btnReset" disabled>リセット</button>
  </div>
</div>

<div class="hist" id="histStrip"><span class="emp">↓ 出目を入力</span></div>

<div class="mid" id="midArea"></div>

<div class="input-bar">
  <input type="text" id="numInput" inputmode="numeric" pattern="[0-9]*" placeholder="0, 00, 1〜36" autocomplete="off">
  <button class="submit-btn" id="btnSubmit">入力</button>
</div>

<script>
// ===== DATA (American Roulette) =====
const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
const COL1 = [1,4,7,10,13,16,19,22,25,28,31,34];
const COL2 = [2,5,8,11,14,17,20,23,26,29,32,35];
const COL3 = [3,6,9,12,15,18,21,24,27,30,33,36];

const disp = n => n===-1?'00':String(n);
const getClr = n => (n===0||n===-1)?'g':REDS.includes(n)?'r':'b';
const getClrLabel = n => (n===0||n===-1)?null:REDS.includes(n)?'赤':'黒';
const getParity = n => n<=0?null:n%2===0?'偶':'奇';
const getHalf = n => n<=0?null:n<=18?'Lo':'Hi';
const getDozen = n => n<=0?null:n<=12?'D1':n<=24?'D2':'D3';
const getCol = n => n<=0?null:COL1.includes(n)?'C1':COL2.includes(n)?'C2':'C3';

let history = [];
try{const d=localStorage.getItem('rt5');if(d)history=JSON.parse(d)}catch(e){}
function save(){try{localStorage.setItem('rt5',JSON.stringify(history))}catch(e){}}

// ===== INPUT =====
const $input = document.getElementById('numInput');
const $submit = document.getElementById('btnSubmit');

function submitInput(){
  const raw = $input.value.trim();
  if(raw === '') return;
  if(raw === '00'){ addNum(-1); $input.value=''; $input.focus(); return; }
  const n = parseInt(raw, 10);
  if(!isNaN(n) && n >= 0 && n <= 36){ addNum(n); $input.value=''; }
  $input.focus();
}

$submit.onclick = submitInput;
$input.addEventListener('keydown', e => { if(e.key === 'Enter') submitInput(); });

// ===== CORE =====
function addNum(n){history.push(n);save();render();}
document.getElementById('btnUndo').onclick=()=>{if(history.length){history.pop();save();render();}};
document.getElementById('btnReset').onclick=()=>{if(confirm('全データをリセットしますか？')){history=[];save();render();}};

// ===== HELPERS =====
function pct(count, total){return total>0?Math.round(count/total*100):0;}

// ===== RENDER =====
function render(){
  document.getElementById('spinCount').textContent=history.length;
  document.getElementById('btnUndo').disabled=!history.length;
  document.getElementById('btnReset').disabled=!history.length;
  renderHist();
  renderMid();
}

function renderHist(){
  const el=document.getElementById('histStrip');
  if(!history.length){el.innerHTML='<span class="emp">↓ 出目を入力</span>';return;}
  el.innerHTML=history.slice(-40).map(n=>`<div class="mc ${getClr(n)}">${disp(n)}</div>`).join('');
  requestAnimationFrame(()=>{el.scrollLeft=el.scrollWidth;});
}

function renderMid(){
  const el=document.getElementById('midArea');
  const total=history.length;
  const nz=history.filter(n=>n>0);
  const nzt=nz.length||1;

  if(!total){
    el.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:15px">↓ 出目を入力してください</div>';
    return;
  }

  const reds=history.filter(n=>REDS.includes(n)).length;
  const blacks=history.filter(n=>n>0&&!REDS.includes(n)).length;
  const zero0=history.filter(n=>n===0).length;
  const zero00=history.filter(n=>n===-1).length;
  const odds=nz.filter(n=>n%2!==0).length;
  const evens=nz.filter(n=>n%2===0).length;
  const lows=nz.filter(n=>n<=18).length;
  const highs=nz.filter(n=>n>18).length;
  const d1=nz.filter(n=>n<=12).length;
  const d2=nz.filter(n=>n>12&&n<=24).length;
  const d3=nz.filter(n=>n>24).length;
  const c1=nz.filter(n=>COL1.includes(n)).length;
  const c2=nz.filter(n=>COL2.includes(n)).length;
  const c3=nz.filter(n=>COL3.includes(n)).length;

  let h='';

  // Recommend
  const sugs=getRecs();
  if(history.length>=5 && sugs.length){
    h+=`<div class="rec">
      <div class="rec-title">🎯 レコメンド</div>
      <div class="rec-tags">${sugs.slice(0,4).map(s=>`<span class="rec-tag">${s.text}</span>`).join('')}</div>
      <div class="rec-hint">※各スピンは独立事象です。娯楽目的の予想です。</div>
    </div>`;
  }

  // 赤 / 黒 / 0 / 00（4分割）
  h+=`<div class="cat">
    <div class="cat-label">赤 / 黒 / 0 / 00</div>
    <div class="split4">
      <div class="s4-item" style="background:rgba(220,38,38,0.12)">
        <div class="s4-label" style="color:#ef4444">🔴 赤</div>
        <div class="s4-count" style="color:#ef4444">${reds}</div>
        <div class="s4-pct" style="color:#ef4444">${pct(reds,total)}%</div>
      </div>
      <div class="s4-item" style="background:rgba(30,30,50,0.5)">
        <div class="s4-label" style="color:#aaa">⚫ 黒</div>
        <div class="s4-count" style="color:#ccc">${blacks}</div>
        <div class="s4-pct" style="color:#ccc">${pct(blacks,total)}%</div>
      </div>
      <div class="s4-item s4-zero" style="background:rgba(22,163,74,0.15)">
        <div class="s4-label" style="color:#16a34a">0</div>
        <div class="s4-count" style="color:#16a34a">${zero0}</div>
        <div class="s4-pct" style="color:#16a34a">${pct(zero0,total)}%</div>
      </div>
      <div class="s4-item s4-zero" style="background:rgba(22,163,74,0.15)">
        <div class="s4-label" style="color:#16a34a">00</div>
        <div class="s4-count" style="color:#16a34a">${zero00}</div>
        <div class="s4-pct" style="color:#16a34a">${pct(zero00,total)}%</div>
      </div>
    </div>
    <div class="s2-bar">
      <div style="width:${pct(reds,total)}%;background:#dc2626"></div>
      <div style="width:${pct(blacks,total)}%;background:#252540"></div>
      <div style="width:${pct(zero0,total)}%;background:#16a34a"></div>
      <div style="flex:1;background:#0d8a3a"></div>
    </div>
  </div>`;

  // 奇偶
  h+=`<div class="cat">
    <div class="cat-label">奇数 / 偶数</div>
    <div class="split2">
      <div class="s2-item" style="background:rgba(139,92,246,0.12)">
        <div class="s2-top"><span class="s2-label" style="color:#8b5cf6">奇数</span><span class="s2-pct" style="color:#8b5cf6">${pct(odds,nzt)}%</span></div>
        <div class="s2-count" style="color:#8b5cf6">${odds}</div>
      </div>
      <div class="s2-item" style="background:rgba(14,165,233,0.12)">
        <div class="s2-top"><span class="s2-label" style="color:#0ea5e9">偶数</span><span class="s2-pct" style="color:#0ea5e9">${pct(evens,nzt)}%</span></div>
        <div class="s2-count" style="color:#0ea5e9">${evens}</div>
      </div>
    </div>
  </div>`;

  // ハイロー
  h+=`<div class="cat">
    <div class="cat-label">ロー(1-18) / ハイ(19-36)</div>
    <div class="split2">
      <div class="s2-item" style="background:rgba(245,158,11,0.12)">
        <div class="s2-top"><span class="s2-label" style="color:#f59e0b">Lo 1-18</span><span class="s2-pct" style="color:#f59e0b">${pct(lows,nzt)}%</span></div>
        <div class="s2-count" style="color:#f59e0b">${lows}</div>
      </div>
      <div class="s2-item" style="background:rgba(16,185,129,0.12)">
        <div class="s2-top"><span class="s2-label" style="color:#10b981">Hi 19-36</span><span class="s2-pct" style="color:#10b981">${pct(highs,nzt)}%</span></div>
        <div class="s2-count" style="color:#10b981">${highs}</div>
      </div>
    </div>
  </div>`;

  // ダズン
  h+=`<div class="cat">
    <div class="cat-label">ダズン (3ブロック)</div>
    <div class="split3">
      <div class="s3-item" style="background:rgba(239,68,68,0.1)">
        <div class="s3-label" style="color:#ef4444">1st 1-12</div>
        <div class="s3-count" style="color:#ef4444">${d1}</div>
        <div class="s3-pct" style="color:#ef4444">${pct(d1,nzt)}%</div>
      </div>
      <div class="s3-item" style="background:rgba(59,130,246,0.1)">
        <div class="s3-label" style="color:#3b82f6">2nd 13-24</div>
        <div class="s3-count" style="color:#3b82f6">${d2}</div>
        <div class="s3-pct" style="color:#3b82f6">${pct(d2,nzt)}%</div>
      </div>
      <div class="s3-item" style="background:rgba(34,197,94,0.1)">
        <div class="s3-label" style="color:#22c55e">3rd 25-36</div>
        <div class="s3-count" style="color:#22c55e">${d3}</div>
        <div class="s3-pct" style="color:#22c55e">${pct(d3,nzt)}%</div>
      </div>
    </div>
  </div>`;

  // カラム
  h+=`<div class="cat">
    <div class="cat-label">カラム (縦3列)</div>
    <div class="split3">
      <div class="s3-item" style="background:rgba(232,112,64,0.1)">
        <div class="s3-label" style="color:#e87040">1列目</div>
        <div class="s3-count" style="color:#e87040">${c1}</div>
        <div class="s3-pct" style="color:#e87040">${pct(c1,nzt)}%</div>
        <div class="s3-nums">${COL1.join(',')}</div>
      </div>
      <div class="s3-item" style="background:rgba(168,85,247,0.1)">
        <div class="s3-label" style="color:#a855f7">2列目</div>
        <div class="s3-count" style="color:#a855f7">${c2}</div>
        <div class="s3-pct" style="color:#a855f7">${pct(c2,nzt)}%</div>
        <div class="s3-nums">${COL2.join(',')}</div>
      </div>
      <div class="s3-item" style="background:rgba(20,184,166,0.1)">
        <div class="s3-label" style="color:#14b8a6">3列目</div>
        <div class="s3-count" style="color:#14b8a6">${c3}</div>
        <div class="s3-pct" style="color:#14b8a6">${pct(c3,nzt)}%</div>
        <div class="s3-nums">${COL3.join(',')}</div>
      </div>
    </div>
  </div>`;

  el.innerHTML=h;
}

// ===== RECOMMENDATIONS =====
function getRecs(){
  if(history.length<5) return [];
  const last20=history.slice(-20),nz=last20.filter(n=>n>0),total=last20.length,sugs=[];
  const reds=last20.filter(n=>REDS.includes(n)).length,blacks=last20.filter(n=>n>0&&!REDS.includes(n)).length;
  if(reds>blacks+4) sugs.push({text:'⚫黒'});
  else if(blacks>reds+4) sugs.push({text:'🔴赤'});
  const odds=nz.filter(n=>n%2!==0).length,evens=nz.filter(n=>n%2===0).length;
  if(odds>evens+3) sugs.push({text:'偶数'});
  else if(evens>odds+3) sugs.push({text:'奇数'});
  const lows=nz.filter(n=>n<=18).length,highs=nz.filter(n=>n>18).length;
  if(lows>highs+3) sugs.push({text:'ハイ19-36'});
  else if(highs>lows+3) sugs.push({text:'ロー1-18'});
  const d1=nz.filter(n=>n<=12).length,d2=nz.filter(n=>n>12&&n<=24).length,d3=nz.filter(n=>n>24).length;
  const avgD=nz.length/3;
  if(d1<avgD*.4&&nz.length>=8) sugs.push({text:'1stDZN'});
  if(d2<avgD*.4&&nz.length>=8) sugs.push({text:'2ndDZN'});
  if(d3<avgD*.4&&nz.length>=8) sugs.push({text:'3rdDZN'});
  const c1n=nz.filter(n=>COL1.includes(n)).length,c2n=nz.filter(n=>COL2.includes(n)).length,c3n=nz.filter(n=>COL3.includes(n)).length;
  const avgC=nz.length/3;
  if(c1n<avgC*.4&&nz.length>=8) sugs.push({text:'1列目'});
  if(c2n<avgC*.4&&nz.length>=8) sugs.push({text:'2列目'});
  if(c3n<avgC*.4&&nz.length>=8) sugs.push({text:'3列目'});
  let streak=1;const lc=getClrLabel(history[history.length-1]);
  if(lc){for(let i=history.length-2;i>=0;i--){if(getClrLabel(history[i])===lc)streak++;else break;}
  if(streak>=4){const opp=lc==='赤'?'⚫黒':'🔴赤';sugs.push({text:`${opp}そろそろ🔥`});}}
  return sugs;
}

// ===== INIT =====
render();

// ===== PWA =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
